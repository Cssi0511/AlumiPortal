<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSSI Alumni Portal - Member Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.crossorigin" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;600;700;800&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --primary-dark: #0a1628;
      --primary-blue: #1e3a8a;
      --accent-gold: #d4a574;
      --accent-red: #dc2626;
      --accent-green: #10b981;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --bg-light: #fafafa;
      --bg-card: #ffffff;
      --border-color: #e5e7eb;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Darker Grotesque', sans-serif;
      background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
      color: white;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.2) 0%, transparent 70%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.3;
      }

      50% {
        transform: scale(1.2);
        opacity: 0.5;
      }
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      backdrop-filter: blur(10px);
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-gold), #b8860b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .btn-logout {
      padding: 0.625rem 1.25rem;
      background: rgba(220, 38, 38, 0.9);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'Darker Grotesque', sans-serif;
    }

    .btn-logout:hover {
      background: var(--accent-red);
      transform: translateY(-2px);
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    /* Views */
    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Login/Register Screen */
    .auth-container {
      max-width: 500px;
      margin: 4rem auto;
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue));
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .auth-header h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .auth-tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.1);
      margin-top: 1rem;
      border-radius: 10px;
      padding: 0.25rem;
    }

    .auth-tab {
      flex: 1;
      padding: 0.75rem;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s;
      font-family: 'Darker Grotesque', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .auth-tab.active {
      background: white;
      color: var(--primary-blue);
    }

    .auth-body {
      padding: 2rem;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Darker Grotesque', sans-serif;
      transition: all 0.3s;
      background: white;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent-red), #b91c1c);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s;
      font-family: 'Darker Grotesque', sans-serif;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: white;
      color: var(--primary-blue);
      border: 2px solid var(--primary-blue);
      padding: 0.875rem 1.5rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'Darker Grotesque', sans-serif;
    }

    .btn-secondary:hover {
      background: var(--primary-blue);
      color: white;
    }

    /* Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary-blue), var(--accent-gold));
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary-dark);
      line-height: 1;
    }

    /* Profile View */
    .profile-container {
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .profile-header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue));
      color: white;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .profile-header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .profile-header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      gap: 2rem;
    }

    .profile-avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-gold), #b8860b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 3rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      flex-shrink: 0;
    }

    .profile-header-info {
      flex: 1;
    }

    .profile-name {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .profile-occupation {
      font-family: 'Crimson Pro', serif;
      font-size: 1.25rem;
      font-style: italic;
      opacity: 0.95;
      margin-bottom: 1rem;
    }

    .profile-member-id {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .profile-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .profile-body {
      padding: 2rem;
    }

    .section {
      margin-bottom: 3rem;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 3px solid var(--primary-blue);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .info-item {
      background: var(--bg-light);
      padding: 1.25rem;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .info-item-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .info-item-value {
      font-size: 1.1rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Edit Mode */
    .edit-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 2px solid var(--border-color);
    }

    /* Alert Messages */
    .alert {
      padding: 1rem 1.5rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      display: none;
      animation: slideDown 0.3s ease-out;
    }

    .alert.active {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .alert-error {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
    }

    .alert-info {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }

    /* Loading Spinner */
    .loading {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border-color);
      border-top-color: var(--primary-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Navigation Tabs */
    .nav-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 0;
    }

    .nav-tab {
      padding: 1rem 2rem;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s;
      font-family: 'Darker Grotesque', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .nav-tab:hover {
      color: var(--primary-blue);
    }

    .nav-tab.active {
      color: var(--primary-blue);
      border-bottom-color: var(--primary-blue);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .container {
        padding: 0 1rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .profile-header-content {
        flex-direction: column;
        text-align: center;
        align-items: center;
      }

      .profile-name {
        font-size: 2rem;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .nav-tabs {
        overflow-x: auto;
        flex-wrap: nowrap;
      }

      .nav-tab {
        padding: 0.75rem 1rem;
        white-space: nowrap;
      }
    }

    /* LinkedIn Link */
    .linkedin-link {
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s;
    }

    .linkedin-link:hover {
      color: var(--accent-gold);
      transform: translateX(4px);
    }
  </style>
</head>

<body>
  <!-- Header (hidden initially) -->
  <header class="header" id="mainHeader" style="display: none;">
    <div class="header-content">
      <h1>Alumni Portal</h1>
      <div class="header-actions">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <span id="userNameDisplay">Member</span>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Login/Register View -->
    <div class="view active" id="authView">
      <div class="auth-container">
        <div class="auth-header">
          <h2>CSSI Alumni Portal</h2>
          <p style="opacity: 0.9; font-family: 'Crimson Pro', serif; font-style: italic;">
            Connect. Network. Grow Together.
          </p>
          <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
            <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
          </div>
        </div>

        <div class="auth-body">
          <div id="authAlert"></div>

          <!-- Login Form -->
          <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label" for="loginEmail">Email Address *</label>
              <input type="email" class="form-input" id="loginEmail" required placeholder="your.email@example.com">
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
              Login to Portal
            </button>

            <p style="margin-top: 1rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
              Don't have an account? <a href="#" onclick="switchAuthTab('register'); return false;"
                style="color: var(--primary-blue); font-weight: 600;">Register here</a>
            </p>
          </form>

          <!-- Register Form -->
          <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="regFullName">Full Name *</label>
                <input type="text" class="form-input" id="regFullName" required placeholder="John Doe">
              </div>

              <div class="form-group">
                <label class="form-label" for="regEmail">Email *</label>
                <input type="email" class="form-input" id="regEmail" required placeholder="john@example.com">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="regPhone">Phone Number *</label>
                <input type="tel" class="form-input" id="regPhone" required placeholder="08012345678">
              </div>

              <div class="form-group">
                <label class="form-label" for="regDOB">Date of Birth *</label>
                <input type="date" class="form-input" id="regDOB" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="regGender">Gender *</label>
                <select class="form-select" id="regGender" required>
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="regYear">Year of Graduation *</label>
                <input type="text" class="form-input" id="regYear" required placeholder="2011">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="regHouse">House</label>
                <input type="text" class="form-input" id="regHouse" placeholder="Red House">
              </div>

              <div class="form-group">
                <label class="form-label" for="regClass">Class</label>
                <input type="text" class="form-input" id="regClass" placeholder="SS3A">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="regCity">City *</label>
                <input type="text" class="form-input" id="regCity" required placeholder="Lagos">
              </div>

              <div class="form-group">
                <label class="form-label" for="regState">State/Province *</label>
                <input type="text" class="form-input" id="regState" required placeholder="Lagos State">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="regCountry">Country *</label>
              <input type="text" class="form-input" id="regCountry" required placeholder="Nigeria">
            </div>

            <div class="form-group">
              <label class="form-label" for="regOccupation">Current Occupation *</label>
              <input type="text" class="form-input" id="regOccupation" required placeholder="Software Engineer">
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="regIndustry">Industry/Field *</label>
                <input type="text" class="form-input" id="regIndustry" required placeholder="Technology">
              </div>

              <div class="form-group">
                <label class="form-label" for="regCompany">Company/Organization *</label>
                <input type="text" class="form-input" id="regCompany" required placeholder="Tech Corp">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="regLinkedIn">LinkedIn Profile</label>
              <input type="url" class="form-input" id="regLinkedIn" placeholder="https://linkedin.com/in/yourprofile">
            </div>

            <div class="form-group">
              <label class="form-label" for="regInvolved">Would you like to be actively involved? *</label>
              <select class="form-select" id="regInvolved" required>
                <option value="">Select Option</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="Maybe">Maybe</option>
              </select>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
              Create Account
            </button>

            <p style="margin-top: 1rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
              Already have an account? <a href="#" onclick="switchAuthTab('login'); return false;"
                style="color: var(--primary-blue); font-weight: 600;">Login here</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <!-- Dashboard View -->
    <div class="view" id="dashboardView">
      <div id="dashboardAlert"></div>

      <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchView('profile')">My Profile</button>
        <button class="nav-tab" onclick="switchView('directory')">Alumni Directory</button>
      </div>

      <!-- Profile Tab -->
      <div id="profileTab" class="tab-content active">
        <div class="loading" id="profileLoading">
          <div class="spinner"></div>
          <p>Loading profile...</p>
        </div>

        <div class="profile-container" id="profileContainer" style="display: none;">
          <!-- Profile Header -->
          <div class="profile-header">
            <div class="profile-header-content">
              <div class="profile-avatar-large" id="profileAvatar">A</div>
              <div class="profile-header-info">
                <h2 class="profile-name" id="profileName">Loading...</h2>
                <p class="profile-occupation" id="profileOccupation">...</p>
                <span class="profile-member-id" id="profileMemberId">Member ID: ...</span>
                <div class="profile-actions">
                  <button class="btn-secondary" onclick="enableEditMode()">
                    ✏️ Edit Profile
                  </button>
                  <button class="btn-secondary" onclick="window.location.href='directory.html'">
                    🔍 Browse Directory
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Profile Body -->
          <div class="profile-body">
            <form id="profileForm">
              <!-- Personal Information -->
              <div class="section">
                <h3 class="section-title">Personal Information</h3>
                <div class="info-grid" id="personalInfoGrid">
                  <!-- Will be populated by JavaScript -->
                </div>
              </div>

              <!-- Professional Information -->
              <div class="section">
                <h3 class="section-title">Professional Information</h3>
                <div class="info-grid" id="professionalInfoGrid">
                  <!-- Will be populated by JavaScript -->
                </div>
              </div>

              <!-- Contact Information -->
              <div class="section">
                <h3 class="section-title">Contact Information</h3>
                <div class="info-grid" id="contactInfoGrid">
                  <!-- Will be populated by JavaScript -->
                </div>
              </div>

              <!-- Edit Actions (hidden by default) -->
              <div class="edit-actions" id="editActions" style="display: none;">
                <button type="button" class="btn-secondary" onclick="cancelEdit()">
                  Cancel
                </button>
                <button type="submit" class="btn-primary" style="width: auto; padding: 0.875rem 2rem;">
                  Save Changes
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Directory Tab -->
      <div id="directoryTab" class="tab-content" style="display: none;">
        <iframe src="directory.html"
          style="width: 100%; height: calc(100vh - 200px); border: none; border-radius: 16px; box-shadow: var(--shadow-lg);"></iframe>
      </div>
    </div>
  </div>

  <script>
    // API Configuration
    const API_URL = 'https://script.google.com/macros/s/AKfycbz55VNk3Z-2f8ylurZqezswIyQ87L4bZlRjpNWUEDkxi1_zVbzd-2N03yUXWrJUgE15/exec';

    // Global state
    let currentUser = null;
    let isEditMode = false;
    let originalFormData = null;

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function () {
      checkAuthStatus();
    });

    // Check if user is logged in
    function checkAuthStatus() {
      const userEmail = localStorage.getItem('userEmail');

      if (userEmail) {
        // User is logged in
        loadUserProfile(userEmail);
      } else {
        // Show login screen
        showView('authView');
      }
    }

    // Switch between login and register
    function switchAuthTab(tab) {
      const loginTab = document.querySelector('.auth-tab:nth-child(1)');
      const registerTab = document.querySelector('.auth-tab:nth-child(2)');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      if (tab === 'login') {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.add('active');
        registerForm.classList.remove('active');
      } else {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.classList.add('active');
        loginForm.classList.remove('active');
      }

      // Clear alert
      document.getElementById('authAlert').innerHTML = '';
    }

    // Handle login
    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('loginEmail').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const response = await fetch(`${API_URL}?action=getUser&identifier=${encodeURIComponent(email)}`);
        const result = await response.json();

        if (result.success && result.user) {
          // Store user email
          localStorage.setItem('userEmail', email);

          // Show success message
          showAuthAlert('Login successful! Welcome back.', 'success');

          // Wait a moment then load dashboard
          setTimeout(() => {
            loadUserProfile(email);
          }, 1000);
        } else {
          showAuthAlert('No account found with this email. Please register first.', 'error');
        }
      } catch (error) {
        console.error('Login error:', error);
        showAuthAlert('Login failed. Please check your connection and try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login to Portal';
      }
    }

    // Handle registration
    async function handleRegister(event) {
      event.preventDefault();

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Creating Account...';

      const userData = {
        email: document.getElementById('regEmail').value,
        fullName: document.getElementById('regFullName').value,
        phoneNumber: document.getElementById('regPhone').value,
        dateOfBirth: document.getElementById('regDOB').value,
        gender: document.getElementById('regGender').value,
        yearOfGraduation: document.getElementById('regYear').value,
        house: document.getElementById('regHouse').value,
        class: document.getElementById('regClass').value,
        city: document.getElementById('regCity').value,
        stateProvince: document.getElementById('regState').value,
        country: document.getElementById('regCountry').value,
        currentOccupation: document.getElementById('regOccupation').value,
        industryField: document.getElementById('regIndustry').value,
        companyOrganization: document.getElementById('regCompany').value,
        linkedinProfile: document.getElementById('regLinkedIn').value,
        activelyInvolved: document.getElementById('regInvolved').value,
        committeePreference: '',
        membershipDues: 'Yes',
        sustainableAmount: '',
        emergencyFullName: '',
        emergencyRelationship: '',
        emergencyPhone: '',
        declaration: 'I agree'
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'addUser',
            userData: userData
          })
        });

        const result = await response.json();

        if (result.success) {
          showAuthAlert(`Account created successfully! Your Member ID is: ${result.memberId}`, 'success');

          // Store user email
          localStorage.setItem('userEmail', userData.email);

          // Wait a moment then load dashboard
          setTimeout(() => {
            loadUserProfile(userData.email);
          }, 2000);
        } else {
          showAuthAlert(result.message || 'Registration failed. Please try again.', 'error');
        }
      } catch (error) {
        console.error('Registration error:', error);
        showAuthAlert('Registration failed. Please check your connection and try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // Load user profile
    async function loadUserProfile(email) {
      document.getElementById('profileLoading').classList.add('active');

      try {
        const response = await fetch(`${API_URL}?action=getUser&identifier=${encodeURIComponent(email)}`);
        const result = await response.json();

        if (result.success && result.user) {
          currentUser = result.user;
          displayUserProfile(result.user);
          showView('dashboardView');
          document.getElementById('mainHeader').style.display = 'block';
        } else {
          throw new Error('Failed to load profile');
        }
      } catch (error) {
        console.error('Profile load error:', error);
        showAuthAlert('Failed to load profile. Please try logging in again.', 'error');
        logout();
      } finally {
        document.getElementById('profileLoading').classList.remove('active');
      }
    }

    // Display user profile
    function displayUserProfile(user) {
      // Update header
      const initials = user.fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userNameDisplay').textContent = user.fullName.split(' ')[0];

      // Update profile header
      document.getElementById('profileAvatar').textContent = initials;
      document.getElementById('profileName').textContent = user.fullName;
      document.getElementById('profileOccupation').textContent = user.currentOccupation;
      document.getElementById('profileMemberId').textContent = `Member ID: ${user.memberId}`;

      // Populate information grids
      populatePersonalInfo(user);
      populateProfessionalInfo(user);
      populateContactInfo(user);

      document.getElementById('profileContainer').style.display = 'block';
    }

    // Populate personal information
    function populatePersonalInfo(user) {
      const grid = document.getElementById('personalInfoGrid');
      grid.innerHTML = `
        ${createInfoItem('Full Name', user.fullName, 'fullName', 'text', true)}
        ${createInfoItem('Date of Birth', formatDate(user.dateOfBirth), 'dateOfBirth', 'date')}
        ${createInfoItem('Gender', user.gender, 'gender', 'select', false, ['Male', 'Female', 'Other'])}
        ${createInfoItem('Year of Graduation', user.yearOfGraduation, 'yearOfGraduation', 'text')}
        ${createInfoItem('House', user.house, 'house', 'text')}
        ${createInfoItem('Class', user.class, 'class', 'text')}
      `;
    }

    // Populate professional information
    function populateProfessionalInfo(user) {
      const grid = document.getElementById('professionalInfoGrid');
      grid.innerHTML = `
        ${createInfoItem('Current Occupation', user.currentOccupation, 'currentOccupation', 'text', true)}
        ${createInfoItem('Industry/Field', user.industryField, 'industryField', 'text', true)}
        ${createInfoItem('Company/Organization', user.companyOrganization, 'companyOrganization', 'text', true)}
        ${createInfoItem('LinkedIn Profile', user.linkedinProfile || 'Not provided', 'linkedinProfile', 'url', false, null, true)}
        ${createInfoItem('Actively Involved', user.activelyInvolved, 'activelyInvolved', 'select', false, ['Yes', 'No', 'Maybe'])}
      `;
    }

    // Populate contact information
    function populateContactInfo(user) {
      const grid = document.getElementById('contactInfoGrid');
      grid.innerHTML = `
        ${createInfoItem('Email', user.email, 'email', 'email', true)}
        ${createInfoItem('Phone Number', user.phoneNumber, 'phoneNumber', 'tel', true)}
        ${createInfoItem('City', user.city, 'city', 'text', true)}
        ${createInfoItem('State/Province', user.stateProvince, 'stateProvince', 'text', true)}
        ${createInfoItem('Country', user.country, 'country', 'text', true)}
      `;
    }

    // Create info item
    function createInfoItem(label, value, fieldName, inputType, required = false, options = null, isLink = false) {
      if (!isEditMode) {
        // Display mode
        let displayValue = value || 'Not provided';

        if (isLink && value && value !== 'Not provided') {
          displayValue = `<a href="${escapeHtml(value)}" target="_blank" class="linkedin-link">View Profile →</a>`;
        } else {
          displayValue = escapeHtml(displayValue);
        }

        return `
          <div class="info-item">
            <div class="info-item-label">${label}</div>
            <div class="info-item-value">${displayValue}</div>
          </div>
        `;
      } else {
        // Edit mode
        let input;

        if (options) {
          // Select dropdown
          input = `
            <select class="form-input" name="${fieldName}" ${required ? 'required' : ''}>
              ${options.map(opt => `<option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>`).join('')}
            </select>
          `;
        } else {
          // Text input
          input = `
            <input 
              type="${inputType}" 
              class="form-input" 
              name="${fieldName}" 
              value="${escapeHtml(value || '')}" 
              ${required ? 'required' : ''}
              placeholder="${label}"
            >
          `;
        }

        return `
          <div class="info-item">
            <div class="info-item-label">${label}</div>
            ${input}
          </div>
        `;
      }
    }

    // Enable edit mode
    function enableEditMode() {
      isEditMode = true;
      originalFormData = { ...currentUser };

      populatePersonalInfo(currentUser);
      populateProfessionalInfo(currentUser);
      populateContactInfo(currentUser);

      document.getElementById('editActions').style.display = 'flex';
      showDashboardAlert('Edit mode enabled. Make your changes and click Save.', 'info');

      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Cancel edit
    function cancelEdit() {
      isEditMode = false;

      if (originalFormData) {
        currentUser = { ...originalFormData };
        displayUserProfile(currentUser);
      }

      document.getElementById('editActions').style.display = 'none';
      document.getElementById('dashboardAlert').innerHTML = '';
    }

    // Handle profile form submission
    document.getElementById('profileForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      if (!isEditMode) return;

      const formData = new FormData(event.target);
      const updates = {};

      for (let [key, value] of formData.entries()) {
        updates[key] = value;
      }

      const submitBtn = event.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'editUser',
            identifier: currentUser.email,
            updates: updates
          })
        });

        const result = await response.json();

        if (result.success) {
          showDashboardAlert('Profile updated successfully!', 'success');

          // Update current user
          Object.assign(currentUser, updates);

          // Exit edit mode
          isEditMode = false;
          displayUserProfile(currentUser);
          document.getElementById('editActions').style.display = 'none';

          // Scroll to top
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          showDashboardAlert(result.message || 'Failed to update profile.', 'error');
        }
      } catch (error) {
        console.error('Update error:', error);
        showDashboardAlert('Update failed. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save Changes';
      }
    });

    // Switch view (profile/directory)
    function switchView(view) {
      const tabs = document.querySelectorAll('.nav-tab');
      tabs.forEach(tab => tab.classList.remove('active'));

      if (view === 'profile') {
        tabs[0].classList.add('active');
        document.getElementById('profileTab').style.display = 'block';
        document.getElementById('directoryTab').style.display = 'none';
      } else {
        tabs[1].classList.add('active');
        document.getElementById('profileTab').style.display = 'none';
        document.getElementById('directoryTab').style.display = 'block';
      }
    }

    // Show view
    function showView(viewId) {
      document.querySelectorAll('.view').forEach(view => {
        view.classList.remove('active');
      });
      document.getElementById(viewId).classList.add('active');
    }

    // Logout
    function logout() {
      localStorage.removeItem('userEmail');
      currentUser = null;
      isEditMode = false;

      document.getElementById('mainHeader').style.display = 'none';
      showView('authView');

      // Reset forms
      document.getElementById('loginForm').reset();
      document.getElementById('registerForm').reset();
      document.getElementById('authAlert').innerHTML = '';
    }

    // Show auth alert
    function showAuthAlert(message, type) {
      const alertDiv = document.getElementById('authAlert');
      alertDiv.innerHTML = `
        <div class="alert alert-${type} active">
          ${escapeHtml(message)}
        </div>
      `;

      setTimeout(() => {
        alertDiv.innerHTML = '';
      }, 5000);
    }

    // Show dashboard alert
    function showDashboardAlert(message, type) {
      const alertDiv = document.getElementById('dashboardAlert');
      alertDiv.innerHTML = `
        <div class="alert alert-${type} active">
          ${escapeHtml(message)}
        </div>
      `;

      setTimeout(() => {
        alertDiv.innerHTML = '';
      }, 5000);
    }

    // Format date
    function formatDate(dateStr) {
      if (!dateStr) return 'Not provided';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
  </script>
</body>

</html>
