<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSSI Alumni Directory - Connect with Professionals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.crossorigin" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;600;700;800&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-dark: #0a1628;
      --primary-blue: #1e3a8a;
      --accent-gold: #d4a574;
      --accent-red: #dc2626;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --bg-light: #fafafa;
      --bg-card: #ffffff;
      --border-color: #e5e7eb;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Darker Grotesque', sans-serif;
      background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
      color: white;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.2) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.5; }
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .header p {
      font-family: 'Crimson Pro', serif;
      font-size: 1.25rem;
      opacity: 0.95;
      max-width: 600px;
      font-style: italic;
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: -2rem auto 4rem;
      padding: 0 2rem;
      position: relative;
      z-index: 2;
    }

    /* Filters */
    .filters {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 3rem;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
    }

    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .filter-header h2 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .results-count {
      background: var(--primary-blue);
      color: white;
      padding: 0.5rem 1.25rem;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .filter-categories {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .category-chip {
      padding: 0.75rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      background: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
    }

    .category-chip::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(30, 58, 138, 0.1), transparent);
      transition: left 0.5s;
    }

    .category-chip:hover::before {
      left: 100%;
    }

    .category-chip:hover {
      border-color: var(--primary-blue);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .category-chip.active {
      background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark));
      color: white;
      border-color: var(--primary-blue);
      transform: scale(1.05);
    }

    .category-chip .count {
      display: inline-block;
      margin-left: 0.25rem;
      opacity: 0.7;
      font-size: 0.85rem;
    }

    /* Search */
    .search-box {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Darker Grotesque', sans-serif;
      transition: all 0.3s;
      background: white;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1.25rem;
    }

    /* Members Grid */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Member Card */
    .member-card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      animation: fadeIn 0.6s ease-out backwards;
    }

    .member-card:nth-child(1) { animation-delay: 0.1s; }
    .member-card:nth-child(2) { animation-delay: 0.2s; }
    .member-card:nth-child(3) { animation-delay: 0.3s; }
    .member-card:nth-child(4) { animation-delay: 0.4s; }
    .member-card:nth-child(5) { animation-delay: 0.5s; }
    .member-card:nth-child(6) { animation-delay: 0.6s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .member-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-blue);
    }

    .member-card-header {
      background: linear-gradient(135deg, var(--primary-blue), var(--primary-dark));
      padding: 1.5rem;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .member-card-header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .member-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      position: relative;
      z-index: 1;
    }

    .member-occupation {
      font-size: 1rem;
      opacity: 0.95;
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    .member-card-body {
      padding: 1.5rem;
    }

    .member-info {
      margin-bottom: 1.5rem;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }

    .info-label {
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 100px;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .info-value {
      color: var(--text-primary);
      flex: 1;
    }

    .member-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .tag {
      background: var(--bg-light);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary-blue);
      border: 1px solid var(--border-color);
    }

    .member-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      flex: 1;
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'Darker Grotesque', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-red), #b91c1c);
      color: white;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
    }

    .btn-secondary {
      background: white;
      color: var(--primary-blue);
      border: 2px solid var(--primary-blue);
    }

    .btn-secondary:hover {
      background: var(--primary-blue);
      color: white;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 22, 40, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue));
      color: white;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .modal-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.2) 0%, transparent 60%);
      animation: pulse 8s ease-in-out infinite;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 1;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: rotate(90deg);
    }

    .modal-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      position: relative;
      z-index: 1;
    }

    .modal-subtitle {
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
      opacity: 0.95;
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    .modal-body {
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Darker Grotesque', sans-serif;
      transition: all 0.3s;
      background: white;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent-red), #b91c1c);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s;
      font-family: 'Darker Grotesque', sans-serif;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    .form-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border-color);
      border-top-color: var(--primary-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 2rem 1rem;
      }

      .header h1 {
        font-size: 2rem;
      }

      .container {
        padding: 0 1rem;
      }

      .filters {
        padding: 1.5rem;
      }

      .filter-categories {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.5rem;
      }

      .members-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .modal-content {
        width: 95%;
      }

      .modal-body {
        padding: 1.5rem;
      }
    }

    /* Success Message */
    .success-message {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      display: none;
      animation: slideDown 0.3s ease-out;
    }

    .success-message.active {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <h1>Alumni Directory</h1>
      <p>Connect with fellow alumni across industries and expertise</p>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Filters Section -->
    <div class="filters">
      <div class="filter-header">
        <h2>Browse by Industry</h2>
        <div class="results-count" id="resultsCount">Loading...</div>
      </div>

      <!-- Search Box -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          class="search-input" 
          id="searchInput"
          placeholder="Search by name, company, or occupation..."
        >
      </div>

      <div class="filter-categories" id="categoryFilters">
        <!-- Categories will be populated by JavaScript -->
      </div>
    </div>

    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading alumni directory...</p>
    </div>

    <!-- Members Grid -->
    <div class="members-grid" id="membersGrid" style="display: none;">
      <!-- Member cards will be populated by JavaScript -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">🔍</div>
      <h3>No alumni found</h3>
      <p>Try adjusting your filters or search criteria</p>
    </div>
  </div>

  <!-- Contact Modal -->
  <div class="modal" id="contactModal">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h2 class="modal-title" id="modalName">Contact Member</h2>
        <p class="modal-subtitle" id="modalOccupation"></p>
      </div>
      <div class="modal-body">
        <div class="success-message" id="successMessage">
          ✓ Message sent successfully! The member will receive your contact request.
        </div>

        <form id="contactForm" onsubmit="sendContactMessage(event)">
          <div class="form-group">
            <label class="form-label" for="senderName">Your Name *</label>
            <input 
              type="text" 
              class="form-input" 
              id="senderName" 
              required
              placeholder="Enter your full name"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="senderEmail">Your Email *</label>
            <input 
              type="email" 
              class="form-input" 
              id="senderEmail" 
              required
              placeholder="your.email@example.com"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="senderPhone">Your Phone</label>
            <input 
              type="tel" 
              class="form-input" 
              id="senderPhone"
              placeholder="0801 234 5678"
            >
          </div>

          <div class="form-group">
            <label class="form-label" for="messageText">Message *</label>
            <textarea 
              class="form-textarea" 
              id="messageText" 
              required
              placeholder="Hi! I'd like to connect with you regarding..."
            ></textarea>
          </div>

          <button type="submit" class="form-submit">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <script>
// API Configuration
const API_URL = 'https://script.google.com/macros/s/AKfycbz55VNk3Z-2f8ylurZqezswIyQ87L4bZlRjpNWUEDkxi1_zVbzd-2N03yUXWrJUgE15/exec';

// Global state
let allMembers = [];
let filteredMembers = [];
let selectedCategory = 'all';
let currentMember = null;

// Industry/Field categories
const CATEGORIES = [
  { id: 'all', name: 'All', keywords: [] },
  { id: 'technology', name: 'Technology', keywords: ['technology', 'tech', 'it', 'software', 'developer', 'engineer', 'programming', 'data', 'ai', 'cyber'] },
  { id: 'finance', name: 'Finance', keywords: ['finance', 'banking', 'accounting', 'investment', 'financial', 'economics'] },
  { id: 'healthcare', name: 'Healthcare', keywords: ['healthcare', 'medical', 'health', 'doctor', 'nurse', 'pharmacy', 'medicine'] },
  { id: 'education', name: 'Education', keywords: ['education', 'teaching', 'academic', 'professor', 'teacher', 'training', 'learning'] },
  { id: 'engineering', name: 'Engineering', keywords: ['engineering', 'civil', 'mechanical', 'electrical', 'structural', 'construction'] },
  { id: 'legal', name: 'Legal', keywords: ['legal', 'law', 'lawyer', 'attorney', 'barrister', 'solicitor'] },
  { id: 'business', name: 'Business', keywords: ['business', 'management', 'consulting', 'entrepreneur', 'executive', 'ceo', 'director'] },
  { id: 'marketing', name: 'Marketing', keywords: ['marketing', 'advertising', 'brand', 'digital marketing', 'sales', 'communications'] },
  { id: 'creative', name: 'Creative', keywords: ['design', 'creative', 'art', 'media', 'content', 'graphics', 'photography', 'video'] },
  { id: 'oil-gas', name: 'Oil & Gas', keywords: ['oil', 'gas', 'petroleum', 'energy', 'upstream', 'downstream'] },
  { id: 'agriculture', name: 'Agriculture', keywords: ['agriculture', 'farming', 'agro', 'agribusiness'] },
  { id: 'hospitality', name: 'Hospitality', keywords: ['hospitality', 'hotel', 'tourism', 'restaurant', 'catering'] },
  { id: 'real-estate', name: 'Real Estate', keywords: ['real estate', 'property', 'realtor', 'housing', 'estate'] },
  { id: 'ngo', name: 'NGO/Non-Profit', keywords: ['ngo', 'non-profit', 'nonprofit', 'charity', 'foundation', 'humanitarian'] }
];

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  loadMembers();
  setupEventListeners();
  renderCategoryFilters();
});

// Setup event listeners
function setupEventListeners() {
  document.getElementById('searchInput').addEventListener('input', handleSearch);

  // Close modal when clicking outside
  document.getElementById('contactModal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeModal();
    }
  });
}

// Render category filters
function renderCategoryFilters() {
  const container = document.getElementById('categoryFilters');
  container.innerHTML = CATEGORIES.map(cat => `
    <div
      class="category-chip ${cat.id === 'all' ? 'active' : ''}"
      onclick="filterByCategory('${cat.id}')"
      id="chip-${cat.id}"
    >
      ${cat.name}
      <span class="count" id="count-${cat.id}">0</span>
    </div>
  `).join('');
}

// Load members from API
async function loadMembers() {
  try {
    // For demo purposes, using sample data
    // Replace this with actual API call
    allMembers = await fetchMembersFromAPI();

    filteredMembers = allMembers;
    updateCategoryCounts();
    renderMembers();
    updateResultsCount();

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('membersGrid').style.display = 'grid';
  } catch (error) {
    console.error('Error loading members:', error);
    document.getElementById('loadingState').innerHTML = `
      <div class="empty-state-icon">⚠️</div>
      <h3>Error Loading Data</h3>
      <p>Please check your API configuration and try again.</p>
    `;
  }
}

// Fetch members from Google Apps Script API
async function fetchMembersFromAPI() {
  const response = await fetch(API_URL + '?action=getAllMembers');
  const data = await response.json();
  return data.members;
}

// Categorize member based on industry field
function categorizeMember(member) {
  const field = (member.industryField || '').toLowerCase();
  const occupation = (member.currentOccupation || '').toLowerCase();
  const company = (member.companyOrganization || '').toLowerCase();
  const searchText = `${field} ${occupation} ${company}`;

  for (const category of CATEGORIES) {
    if (category.id === 'all') continue;

    for (const keyword of category.keywords) {
      if (searchText.includes(keyword.toLowerCase())) {
        return category.id;
      }
    }
  }

  return 'other';
}

// Update category counts
function updateCategoryCounts() {
  const counts = {};

  CATEGORIES.forEach(cat => {
    counts[cat.id] = 0;
  });

  allMembers.forEach(member => {
    const category = categorizeMember(member);
    counts[category] = (counts[category] || 0) + 1;
    counts['all']++;
  });

  CATEGORIES.forEach(cat => {
    const countEl = document.getElementById(`count-${cat.id}`);
    if (countEl) {
      countEl.textContent = `(${counts[cat.id] || 0})`;
    }
  });
}

// Filter by category
function filterByCategory(categoryId) {
  selectedCategory = categoryId;

  // Update active state
  document.querySelectorAll('.category-chip').forEach(chip => {
    chip.classList.remove('active');
  });
  document.getElementById(`chip-${categoryId}`).classList.add('active');

  // Filter members
  if (categoryId === 'all') {
    filteredMembers = allMembers;
  } else {
    filteredMembers = allMembers.filter(member => {
      return categorizeMember(member) === categoryId;
    });
  }

  // Apply search if exists
  const searchTerm = document.getElementById('searchInput').value;
  if (searchTerm) {
    handleSearch();
  } else {
    renderMembers();
    updateResultsCount();
  }
}

// Handle search
function handleSearch() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();

  let membersToSearch = selectedCategory === 'all'
    ? allMembers
    : allMembers.filter(m => categorizeMember(m) === selectedCategory);

  // Apply search (name, occupation, company, city)
  if (searchTerm) {
    membersToSearch = membersToSearch.filter(member => {
      return (
        member.fullName.toLowerCase().includes(searchTerm) ||
        member.currentOccupation.toLowerCase().includes(searchTerm) ||
        member.companyOrganization.toLowerCase().includes(searchTerm) ||
        member.city.toLowerCase().includes(searchTerm)
      );
    });
  }

  filteredMembers = membersToSearch;

  renderMembers();
  updateResultsCount();
}

// Render members
function renderMembers() {
  const grid = document.getElementById('membersGrid');
  const emptyState = document.getElementById('emptyState');

  if (filteredMembers.length === 0) {
    grid.style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }

  emptyState.style.display = 'none';
  grid.style.display = 'grid';

  grid.innerHTML = filteredMembers.map(member => createMemberCard(member)).join('');
}

// Create member card HTML
function createMemberCard(member) {
  const category = categorizeMember(member);
  const categoryName = CATEGORIES.find(c => c.id === category)?.name || 'Other';

  return `
    <div class="member-card">
      <div class="member-card-header">
        <h3 class="member-name">${escapeHtml(member.fullName)}</h3>
        <p class="member-occupation">${escapeHtml(member.currentOccupation)}</p>
      </div>
      <div class="member-card-body">
        <div class="member-info">
          <div class="info-row">
            <span class="info-label">Company</span>
            <span class="info-value">${escapeHtml(member.companyOrganization)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Industry</span>
            <span class="info-value">${escapeHtml(member.industryField)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Location</span>
            <span class="info-value">${escapeHtml(member.city)}</span>
          </div>

        </div>
        <div class="member-tags">
          <span class="tag">${categoryName}</span>
        </div>
        <div class="member-actions">
          <button class="btn btn-primary" onclick='openContactModal(${JSON.stringify(member)})'>
            Contact
          </button>
          ${member.linkedinProfile ? `
            <button class="btn btn-secondary" onclick="window.open("${member.linkedinProfile}", "_blank")'>
              LinkedIn
            </button>
          ` : ''}
        </div>
      </div>
    </div>
  `;
}

// Update results count
function updateResultsCount() {
  const count = filteredMembers.length;
  const total = allMembers.length;
  document.getElementById('resultsCount').textContent =
    `${count} of ${total} ${count === 1 ? 'member' : 'members'}`;
}

// Open contact modal
function openContactModal(member) {
  currentMember = member;
  document.getElementById('modalName').textContent = member.fullName;
  document.getElementById('modalOccupation').textContent = member.currentOccupation;
  document.getElementById('contactModal').classList.add('active');
  document.getElementById('contactForm').reset();
  document.getElementById('successMessage').classList.remove('active');
  document.body.style.overflow = 'hidden';
}

// Close modal
function closeModal() {
  document.getElementById('contactModal').classList.remove('active');
  document.body.style.overflow = 'auto';
  currentMember = null;
}

// Send contact message
async function sendContactMessage(event) {
  event.preventDefault();

  const formData = {
    recipientName: currentMember.fullName,
    recipientEmail: currentMember.email,
    senderName: document.getElementById('senderName').value,
    senderEmail: document.getElementById('senderEmail').value,
    senderPhone: document.getElementById('senderPhone').value,
    message: document.getElementById('messageText').value
  };

  try {
    // TODO: Send to Google Apps Script API
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { "Content-Type": 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'sendContactRequest',
        data: formData
      })
    });

    // Show success message
    document.getElementById('successMessage').classList.add('active');
    document.getElementById('contactForm').reset();

    // Close modal after 2 seconds
    setTimeout(() => {
      closeModal();
    }, 2000);

    console.log('Contact message:', formData);
  } catch (error) {
    console.error('Error sending message:', error);
    alert('Failed to send message. Please try again.');
  }
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}
